name: Flujo de trabajo para ejecutar los test
on:
  workflow_dispatch:
  push:
    branches: [ V.0.2 ]
  pull_request:
    branches: [ V.0.2 ]
  schedule:
    - cron: '1 23 * * 0-4'

jobs:
  # Trabajo 1: Construcción
  Build:
    runs-on: ubuntu-latest
    env:
      GITHUB_LOGIN: ${{ github.actor }}
      GITHUB_PACKAGES: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GHTOKEN }}
    steps:
      - name: Clonando el repositorio
        uses: actions/checkout@v3
      - name: Configurando java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Ensamblar artefacto
        run: |
          chmod +x gradlew        
          ./gradlew assemble

  # Trabajo 2: Verificación
  Verificacion:
    runs-on: ubuntu-latest
    needs: Build 
    env:
      GITHUB_LOGIN: ${{ github.actor }}
      GITHUB_PACKAGES: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_OAUTH: ${{ secrets.GHTOKEN }}
    steps:
      - name: Clonando el repositorio
        uses: actions/checkout@v3
      - name: Configurando java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Ejecutar pruebas unitarias
        run: |
          chmod +x gradlew        
          ./gradlew test